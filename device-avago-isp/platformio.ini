; PlatformIO — Avago 解析/書換用ファーム (ISP + I2C mailbox)
;
; 専用ボード配線 (VCC/GND 以外は SFPピン番号 = RP2040 GPIO番号):
;   MOSI = SFP pin4  -> GP4   (I2C bus0 SDA と共用)
;   SCK  = SFP pin5  -> GP5   (I2C bus0 SCL と共用)
;   MISO = SFP pin9  -> GP9
;   RST  = SFP pin15 -> GP15
;   VCC  = SFP pin16 -> 3V3
;   GND  = SFP pin1  -> GND
;
; 既存ゲートウェイ(device-src, bus0=12/13)とは別物。こちらを専用ボードへ書く。

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_flags = -DUSE_TINYUSB
